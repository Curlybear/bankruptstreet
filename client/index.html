<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bankrupt Street</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-space: #06060c;
        --bg-cockpit: rgba(10, 10, 22, 0.7);
        --bg-panel: rgba(16, 16, 32, 0.5);
        --border-neon: rgba(139, 92, 246, 0.15);
        
        --color-primary: #8b5cf6;
        --color-primary-glow: rgba(139, 92, 246, 0.4);
        --color-cyber: #06b6d4;
        --color-cyber-glow: rgba(6, 182, 212, 0.4);
        
        --color-success: #10b981;
        --color-success-glow: rgba(16, 185, 129, 0.4);
        --color-warning: #f59e0b;
        --color-warning-glow: rgba(245, 158, 11, 0.4);
        --color-danger: #f43f5e;
        --color-danger-glow: rgba(244, 63, 94, 0.4);
        
        --font-main: 'Outfit', sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg-space);
        color: #e2e8f0;
        font-family: var(--font-main);
        overflow: hidden;
        user-select: none;
      }

      /* Custom high-end thin glassmorphic scrollbars */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.3);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(139, 92, 246, 0.2);
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.03);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(139, 92, 246, 0.4);
        box-shadow: 0 0 6px var(--color-primary-glow);
      }

      /* Global Bezel Panel Utilities */
      .glass-panel {
        background: var(--bg-cockpit);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }

      .glow-border-purple {
        border: 1px solid rgba(139, 92, 246, 0.2);
        box-shadow: inset 0 0 15px rgba(139, 92, 246, 0.05), 0 0 25px rgba(139, 92, 246, 0.08);
      }

      .glow-border-cyber {
        border: 1px solid rgba(6, 182, 212, 0.2);
        box-shadow: inset 0 0 15px rgba(6, 182, 212, 0.05), 0 0 25px rgba(6, 182, 212, 0.08);
      }

      .glow-border-success {
        border: 1px solid rgba(16, 185, 129, 0.2);
        box-shadow: inset 0 0 15px rgba(16, 185, 129, 0.05), 0 0 25px rgba(16, 185, 129, 0.08);
      }

      .glow-border-danger {
        border: 1px solid rgba(244, 63, 94, 0.2);
        box-shadow: inset 0 0 15px rgba(244, 63, 94, 0.05), 0 0 25px rgba(244, 63, 94, 0.08);
      }

      /* Animations */
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes pulse-cyan {
        0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); }
        70% { box-shadow: 0 0 0 8px rgba(6, 182, 212, 0); }
        100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
      }

      @keyframes pulse-purple {
        0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); }
        70% { box-shadow: 0 0 0 8px rgba(139, 92, 246, 0); }
        100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); }
      }

      @keyframes pulse-gold {
        0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
        70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
        100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
      }

      @keyframes pulse-emerald {
        0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
        70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
        100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
      }

      @keyframes slide-up {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .animate-slide-up {
        animation: slide-up 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .animate-fade-in {
        animation: fade-in 0.25s ease-out forwards;
      }

      /* Casino */
      @keyframes slime-hop {
        0%, 100% { transform: translateY(0) scaleY(1); }
        50% { transform: translateY(-5px) scaleY(0.92); }
      }

      @keyframes marquee-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.25; }
      }

      @keyframes casino-win-flash {
        0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.6); transform: scale(0.9); opacity: 0; }
        40% { transform: scale(1.06); opacity: 1; }
        100% { box-shadow: 0 0 24px 6px rgba(250, 204, 21, 0.25); transform: scale(1); opacity: 1; }
      }

      @keyframes casino-lose-thud {
        0% { transform: translateY(-10px) scale(0.95); opacity: 0; }
        60% { transform: translateY(2px) scale(1.01); opacity: 1; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }

      .casino-card-flip {
        transform-style: preserve-3d;
        transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
      }
      .casino-card-flip.flipped {
        transform: rotateY(180deg);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
